apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun
  namespace: media
  labels:
    app: gluetun
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gluetun
  template:
    metadata:
      labels:
        app: gluetun
    spec:
      # Preferred muscle scheduling with high availability failover to atlantis
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - phantom
                      - atlantis
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - phantom
      
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 1.1.1.1
        options:
          - name: ndots
            value: "1"

      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            - name: VPN_ENDPOINT_IP
              value: 162.159.192.1 
            - name: VPN_ENDPOINT_PORT
              value: "2408"
            - name: WIREGUARD_PUBLIC_KEY
              value: "bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo="
            
            # Cryptographic token definitions
            - name: WIREGUARD_PRIVATE_KEY
              value: "0AX85KU5RqySyoQJ/UqTRyNyuNKmQ5owx1izVzcRz0Y="
            - name: WIREGUARD_ADDRESSES
              value: "172.16.0.2/32"
            
            # Network optimization and firewall parameters
            - name: WIREGUARD_MTU
              value: "1280"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16,192.168.1.0/24"
            - name: FIREWALL_INPUT_PORTS
              value: "8888"
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "plain"
            - name: DNS_UPSTREAM_PLAIN_ADDRESSES
              value: "1.1.1.1:53,8.8.8.8:53"
            - name: HEALTH_RESTART_VPN
              value: "off"
            
            # THE FIX: Activates the HTTP Proxy Engine over Port 8888 across versions
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            - name: PROXY_HTTP_SERVER
              value: "on"
            - name: PROXY_HTTP_SERVER_LISTENING_ADDRESS
              value: ":8888"
              
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - containerPort: 8888
              name: http-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: gluetun-svc
  namespace: media
spec:
  selector:
    app: gluetun
  type: ClusterIP
  ports:
    - name: http-proxy
      port: 8888
      targetPort: 8888
