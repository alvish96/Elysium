apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sjcam-stream
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/alvish96/Elysium.git'
    targetRevision: HEAD
    path: stream
    directory:
      include: 'sjcam-stream.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

