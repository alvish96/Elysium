apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthchecks-pinger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/alvish96/Elysium.git'
    targetRevision: HEAD
    path: app-code/healthchecks
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
