apiVersion: v1
kind: ConfigMap
metadata:
  name: healthchecks-config
  namespace: monitoring
data:
  urls.txt: |
    atlantis https://hc-ping.com/b414992a-2ffd-4103-aaa9-52a731e95c96
    phantom https://hc-ping.com/34119d38-0611-4056-ba24-9b2a77aca0cf
    olympus https://hc-ping.com/fedfffd3-c28f-4738-955c-ed7cd1490e04
    pi https://hc-ping.com/a9ce951e-2443-45e4-9945-f6b7292f6b17
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-healthcheck-pinger
  namespace: monitoring
  labels:
    app: node-pinger
spec:
  selector:
    matchLabels:
      app: node-pinger
  template:
    metadata:
      labels:
        app: node-pinger
    spec:
      # === THE BULLETPROOF FIX ===
      # Ignore the host's 127.0.0.53 loopback and use raw public internet DNS
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
          
      containers:
        - name: pinger
          image: curlimages/curl:latest
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Started Dead Man's Snitch on node: $MY_NODE_NAME"
              while true; do
                PING_URL=$(grep "^${MY_NODE_NAME} " /config/urls.txt | awk '{print $2}')
                if [ -n "$PING_URL" ]; then
                  # We put > /dev/null back in so it doesn't spam your logs with HTML
                  curl -s -m 10 --retry 3 "$PING_URL" > /dev/null
                  echo "Pinged Healthchecks.io for $MY_NODE_NAME"
                fi
                sleep 60
              done
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          configMap:
            name: healthchecks-config
