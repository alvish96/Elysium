apiVersion: v1
kind: PersistentVolume
metadata:
  name: uptimekuma-pv
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-uptimekuma
  local:
    path: /mnt/internal/appdata/uptimekuma
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - olympus # STRICTLY PINNED TO THE BATTERY-BACKED NODE
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptimekuma-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-uptimekuma
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptimekuma
  namespace: monitoring
  labels:
    app: uptimekuma
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptimekuma
  template:
    metadata:
      labels:
        app: uptimekuma
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus # STRICTLY PINNED TO THE BATTERY-BACKED NODE
      containers:
        - name: uptimekuma
          image: louislam/uptime-kuma:2.4.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptimekuma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: uptimekuma-svc
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: uptimekuma
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30301
