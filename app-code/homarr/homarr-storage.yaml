apiVersion: v1
kind: PersistentVolume
metadata:
  name: homarr-nfs-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    server: 192.168.1.160 # Atlantis Control Plane IP
    path: /mnt/internal/appdata/homarr_v1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homarr-nfs-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 5Gi
