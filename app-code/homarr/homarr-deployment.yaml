apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: media
  labels:
    app: homarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      # === FAILOVER SCHEDULING: PREFER PHANTOM, FALLBACK TO ATLANTIS ===
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - phantom
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - phantom
                      - atlantis
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:latest
          ports:
            - containerPort: 7575
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1024Mi"
              cpu: "1500m"
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: SECRET_ENCRYPTION_KEY
              value: "a031a6649d8204b80d5271b46906ce72a2d1e0821d5b0859ad873cee2264346f"
            - name: AUTH_PROVIDERS
              value: "credentials"
          volumeMounts:
            - name: homarr-data
              mountPath: /appdata
      volumes:
        - name: homarr-data
          persistentVolumeClaim:
            claimName: homarr-nfs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: homarr-svc
  namespace: media
spec:
  type: NodePort
  selector:
    app: homarr
  ports:
    - name: http
      port: 7575
      targetPort: 7575
      nodePort: 30575
