apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: media
  labels:
    app: homarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: phantom
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:latest
          ports:
            - containerPort: 7575
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          env:
            - name: TZ
              value: "Asia/Kolkata"
          volumeMounts:
            - name: homarr-data
              mountPath: /app/data/configs
            - name: homarr-icons
              mountPath: /app/public/icons
      volumes:
        - name: homarr-data
          persistentVolumeClaim:
            claimName: homarr-local-pvc
        - name: homarr-icons
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homarr-svc
  namespace: media
spec:
  type: NodePort
  selector:
    app: homarr
  ports:
    - name: http
      port: 7575
      targetPort: 7575
      nodePort: 30575
