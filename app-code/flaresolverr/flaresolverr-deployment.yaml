apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
  labels:
    app: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      # === STRICT FAILOVER LOGIC ===
      affinity:
        nodeAffinity:
          # Rule 1: It MUST run on either Phantom or Atlantis (Locks out Olympus/Pi)
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                - atlantis
          # Rule 2: If both are online, Phantom gets 100% priority
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom

      # Prevents Chrome from crashing at the kernel level
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          
          # Fix: High memory limit to process Cloudflare Javascript
          resources:
            requests:
              memory: "250Mi"
            limits:
              memory: "1Gi" 
              
          securityContext:
            allowPrivilegeEscalation: true
            
          env:
            - name: TZ
              value: "Asia/Kolkata"
            # Fix: Proxy removed to use clean residential IP
            - name: LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8191
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr-svc
  namespace: media
spec:
  selector:
    app: flaresolverr
  type: ClusterIP
  ports:
    - name: http
      port: 8191
      targetPort: 8191
