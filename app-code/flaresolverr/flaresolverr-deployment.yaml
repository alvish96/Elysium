apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
  labels:
    app: flaresolverr
spec:
  replicas: 1
  # Strategy block removed completely to fix the live cluster validation conflict
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      # === STRICT PHANTOM-TO-ATLANTIS FAILOVER ===
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                - atlantis
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          
          resources:
            requests:
              memory: "250Mi"
            limits:
              memory: "1Gi" # Keeps Chrome stable under heavy Cloudflare challenges
              
          securityContext:
            allowPrivilegeEscalation: true
            
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8191
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr-svc
  namespace: media
spec:
  selector:
    app: flaresolverr
  type: ClusterIP
  ports:
    - name: http
      port: 8191
      targetPort: 8191
