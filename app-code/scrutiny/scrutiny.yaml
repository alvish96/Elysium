apiVersion: v1
kind: PersistentVolume
metadata:
  name: scrutiny-config-pv
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual-scrutiny-config
  local:
    path: /mnt/internal/appdata/scrutiny/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - atlantis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scrutiny-config-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual-scrutiny-config
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: scrutiny-db-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual-scrutiny-db
  local:
    path: /mnt/internal/appdata/scrutiny/influxdb
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - atlantis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scrutiny-db-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual-scrutiny-db
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrutiny
  namespace: media
  labels:
    app: scrutiny
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scrutiny
  template:
    metadata:
      labels:
        app: scrutiny
    spec:
      # Pinned to Atlantis because that is where the physical drives are attached
      nodeSelector:
        kubernetes.io/hostname: atlantis

      dnsPolicy: ClusterFirst
      
      # AppArmor bypass to prevent container crash loops
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        - name: scrutiny
          image: ghcr.io/analogj/scrutiny:master-omnibus
          # CRITICAL: Must be privileged to query physical hardware /dev sensors
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          env:
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - containerPort: 8080
              name: webui
          volumeMounts:
            - name: config
              mountPath: /opt/scrutiny/config
            - name: influxdb
              mountPath: /opt/scrutiny/influxdb
            - name: run-udev
              mountPath: /run/udev
              readOnly: true
            - name: dev
              mountPath: /dev
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: scrutiny-config-pvc
        - name: influxdb
          persistentVolumeClaim:
            claimName: scrutiny-db-pvc
        - name: run-udev
          hostPath:
            path: /run/udev
        - name: dev
          hostPath:
            path: /dev
---
apiVersion: v1
kind: Service
metadata:
  name: scrutiny-svc
  namespace: media
spec:
  selector:
    app: scrutiny
  type: NodePort
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 30880
