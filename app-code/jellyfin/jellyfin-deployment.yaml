apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority-media
value: 1000000
globalDefault: false
description: "VIP priority class to guarantee seamless media streaming and eliminate playback stutter."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
      annotations:
        container.apparmor.security.beta.kubernetes.io/jellyfin: unconfined
    spec:
      # === VIP SCHEDULING PRIORITY ===
      priorityClassName: high-priority-media
      
      nodeSelector:
        kubernetes.io/hostname: atlantis
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
          env:
            - name: JELLYFIN_LOG_DIR
              value: "/config/log"
          ports:
            - containerPort: 8096
              name: http
              
          # === DEDICATED RESOURCE ALLOCATION ===
          resources:
            requests:
              cpu: "500m"       # Reserves half a core minimum purely for Jellyfin
              memory: "800Mi"   # Guarantees a safe RAM cache floor
            limits:
              cpu: "2500m"      # Allows Jellyfin to burst across 2.5 cores if needed
              memory: "1500Mi"  # Hard cap ceiling to protect the node from crashing
              
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: nexus-volume
              mountPath: /data/nexus_pool
            - name: phantom-volume
              mountPath: /data/phantom_nfs
            - name: render-dev
              mountPath: /dev/dri
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: nexus-volume
          persistentVolumeClaim:
            claimName: jellyfin-nexus-pvc
        - name: phantom-volume
          persistentVolumeClaim:
            claimName: jellyfin-phantom-pvc
        - name: render-dev
          hostPath:
            path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-svc
  namespace: media
spec:
  selector:
    app: jellyfin
  type: NodePort
  ports:
    - port: 8096
      targetPort: 8096
      nodePort: 30096
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-ingress
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.local`)
      kind: Rule
      services:
        - name: jellyfin-svc
          port: 8096
