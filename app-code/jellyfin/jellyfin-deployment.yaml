apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: atlantis
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          # We elevate privileges slightly so the pod can talk to the physical GPU hardware
          securityContext:
            privileged: true
          ports:
            - containerPort: 8096
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data/nexus_pool
            # === MOUNT THE GPU INTO THE POD ===
            - name: render-dev
              mountPath: /dev/dri
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media-pvc
        # === GRAB THE PHYSICAL GPU FROM THE HOST ===
        - name: render-dev
          hostPath:
            path: /dev/dri
