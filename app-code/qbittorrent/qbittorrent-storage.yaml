# === PVC CLAIMS ===
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: qbittorrent-config-pvc, namespace: media }
spec: { accessModes: [ ReadWriteOnce ], storageClassName: local-storage-qbittorrent, resources: { requests: { storage: 10Gi } } }
