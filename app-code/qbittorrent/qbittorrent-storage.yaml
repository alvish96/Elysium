apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-config-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-qbittorrent
  local:
    path: /mnt/internal/appdata/qbittorrent/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [atlantis]
---
# === THE NESTED DATA POOLS ===
apiVersion: v1
kind: PersistentVolume
metadata: { name: qbit-base-pv }
spec:
  capacity: { storage: 10Ti }
  volumeMode: Filesystem
  accessModes: [ ReadWriteMany ]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-qbittorrent
  local: { path: /mnt/databox_06_894G_4/data/torrents } # Untagged downloads
  nodeAffinity: { required: { nodeSelectorTerms: [ { matchExpressions: [ { key: kubernetes.io/hostname, operator: In, values: [atlantis] } ] } ] } }
---
