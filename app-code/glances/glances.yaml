apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: glances
  namespace: media
  labels:
    app: glances
spec:
  selector:
    matchLabels:
      app: glances
  template:
    metadata:
      labels:
        app: glances
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      
      # THE FIX: Explicitly exclude the Raspberry Pi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - pi

      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        - name: glances
          image: nicolargo/glances:4.5.5-full
          securityContext:
            allowPrivilegeEscalation: true
            runAsUser: 0
          env:
            - name: GLANCES_OPT
              value: "-w"
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - containerPort: 61208
              name: webui
              protocol: TCP
