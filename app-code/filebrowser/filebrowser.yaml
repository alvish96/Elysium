apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: media
  labels:
    app: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      nodeSelector:
        kubernetes.io/hostname: atlantis # STRICT PLACEMENT
        
      # FIXED: Corrected YAML indentation and set to 0 (root) so it has permission to move files across all MergerFS drives
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        
      containers:
      - name: filebrowser
        image: filebrowser/filebrowser:latest
        imagePullPolicy: Always
        
        # Hardcoded command to bypass the login screen entirely
        command: ["/filebrowser"]
        args:
          - "-a", "0.0.0.0"
          - "-p", "80"
          - "-d", "/database/filebrowser.db"
          - "--auth.method", "noauth"
          
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: storage-pool
          mountPath: /srv
        - name: fb-database
          mountPath: /database
          
      volumes:
      - name: storage-pool
        hostPath:
          path: /mnt # Mounts ALL your pools (movies, tvshows, audio, etc.)
          type: Directory
      - name: fb-database
        hostPath:
          path: /mnt/internal/appdata/filebrowser
          type: DirectoryOrCreate # Automatically creates the folder if missing
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser-svc
  namespace: media
spec:
  type: NodePort
  selector:
    app: filebrowser
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30083
