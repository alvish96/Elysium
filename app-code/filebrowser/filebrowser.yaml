apiVersion: v1
kind: PersistentVolume
metadata:
  name: filebrowser-config-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-filebrowser
  local:
    path: /mnt/internal/appdata/filebrowser
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - atlantis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-config-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-filebrowser
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: media
  labels:
    app: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      nodeSelector:
        kubernetes.io/hostname: atlantis

      # === THE FIX: Force DB Initialization ===
      initContainers:
        - name: init-db
          image: filebrowser/filebrowser:latest
          command: ['sh', '-c']
          args:
            - |
              echo "Checking for database..."
              if [ ! -f /database/filebrowser.db ]; then
                echo "Creating new database and injecting admin user..."
                /filebrowser config init -d /database/filebrowser.db
                /filebrowser config set --auth.method=json -d /database/filebrowser.db
                /filebrowser users add admin admin --perm.admin -d /database/filebrowser.db
                echo "Database created successfully."
              else
                echo "Database already exists."
              fi
          volumeMounts:
            - name: config
              mountPath: /database

      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0   
            runAsGroup: 0
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /database
            - name: root-mnt
              mountPath: /srv
          env:
            - name: FB_DATABASE
              value: "/database/filebrowser.db"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: filebrowser-config-pvc
        - name: root-mnt
          hostPath:
            path: /mnt
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser-svc
  namespace: media
spec:
  selector:
    app: filebrowser
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30088
