apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-sharing
  namespace: media
  labels:
    app: local-sharing
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: local-sharing
  template:
    metadata:
      labels:
        app: local-sharing
    spec:
      nodeSelector:
        kubernetes.io/hostname: atlantis
      
      # Binds directly to the physical 192.168.1.160 network
      hostNetwork: true
      
      # === THE FIX: Bypass Kubernetes DNS and force public resolvers ===
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
      
      containers:
        # === SMB SERVER ===
        - name: samba
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing Samba..."
              apk add --no-cache samba
              
              echo "Building required cache directories..."
              mkdir -p /var/log/samba /var/run/samba /var/lib/samba/private /etc/samba
              
              echo "Injecting Configuration..."
              cat << 'CONFIG' > /etc/samba/smb.conf
              [global]
                workgroup = WORKGROUP
                server string = Elysium VR Server
                server role = standalone server
                map to guest = Bad User
                log file = /var/log/samba/%m.log
                max log size = 50
                smb ports = 445 139
              [Elysium_Files]
                path = /mnt
                public = yes
                guest ok = yes
                read only = yes
                browseable = yes
                force user = root
              CONFIG
              
              echo "Starting NMBD Discovery..."
              nmbd -D
              
              echo "Starting SMBD Server..."
              exec smbd --foreground --no-process-group
          volumeMounts:
            - name: storage-pool
              mountPath: /mnt
              readOnly: true

        # === DLNA SERVER ===
        - name: dlna
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing MiniDLNA..."
              apk add --no-cache minidlna
              
              echo "Building required cache directories..."
              mkdir -p /var/cache/minidlna /var/log/minidlna /run/minidlna /etc
              
              echo "Injecting Configuration..."
              cat << 'CONFIG' > /etc/minidlna.conf
              port=8200
              media_dir=/mnt/nexus_pool/data/media
              friendly_name=Elysium VR DLNA
              db_dir=/var/cache/minidlna
              log_dir=/var/log/minidlna
              inotify=yes
              user=root
              CONFIG
              
              echo "Starting MiniDLNA Server..."
              exec minidlnad -d
          volumeMounts:
            - name: storage-pool
              mountPath: /mnt
              readOnly: true
              
      volumes:
        - name: storage-pool
          hostPath:
            path: /mnt
            type: Directory
