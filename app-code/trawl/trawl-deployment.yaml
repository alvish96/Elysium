apiVersion: apps/v1
kind: Deployment
metadata:
  name: trawl
  namespace: media
  labels:
    app: trawl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trawl
  template:
    metadata:
      labels:
        app: trawl
    spec:
      # === STRICT PHANTOM-TO-ATLANTIS FAILOVER ===
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                - atlantis
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        # === CONTAINER 1: The Redis Memory Cache ===
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "256Mi"

        # === CONTAINER 2: The TRAWL Camoufox Engine ===
        - name: trawl
          image: germondai/trawl:latest
          resources:
            requests:
              memory: "250Mi"
            limits:
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: true
          env:
            - name: TZ
              value: "Asia/Kolkata"
            # Link TRAWL directly to the adjacent Redis container via localhost
            - name: REDIS_URL
              value: "redis://localhost:6379"
            - name: PORT_API
              value: "8191"
          ports:
            - containerPort: 8191
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: trawl-svc
  namespace: media
spec:
  selector:
    app: trawl
  type: ClusterIP
  ports:
    - name: http
      port: 8191
      targetPort: 8191
