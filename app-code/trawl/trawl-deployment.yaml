apiVersion: apps/v1
kind: Deployment
metadata:
  name: trawl
  namespace: media
  labels:
    app: trawl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trawl
  template:
    metadata:
      labels:
        app: trawl
    spec:
      # === STRICT PHANTOM-TO-ATLANTIS FAILOVER ===
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                - atlantis
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - phantom
                
      securityContext:
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined

      containers:
        # === CONTAINER 1: Lean Redis Cookie Cache ===
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "16Mi"
            limits:
              memory: "64Mi" # Heavily throttled to protect Atlantis

        # === CONTAINER 2: Stealthy TRAWL Scraper ===
        - name: trawl
          image: ghcr.io/germondai/trawl:latest
          resources:
            requests:
              memory: "150Mi"
            limits:
              memory: "512Mi" # Reduced by half to ensure zero host stress
          securityContext:
            allowPrivilegeEscalation: true
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: REDIS_URL
              value: "redis://localhost:6379"
            - name: PORT_API
              value: "8191"
          ports:
            - containerPort: 8191
              name: http
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi # Scaled down safely for text scraping
---
apiVersion: v1
kind: Service
metadata:
  name: trawl-svc
  namespace: media
spec:
  selector:
    app: trawl
  type: ClusterIP
  ports:
    - name: http
      port: 8191
      targetPort: 8191
