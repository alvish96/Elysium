apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server-ingress
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.local`) # Change this to your preferred local domain name
      kind: Rule
      services:
        - name: argocd-server
          port: 443
          serversTransport: argocd-transport
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-transport
  namespace: argocd
spec:
  insecureSkipVerify: true # Allows Traefik to accept ArgoCD's self-signed backend cert
