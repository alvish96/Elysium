apiVersion: v1
kind: PersistentVolume
metadata:
  name: youtube-stream-local-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-ssd
  local:
    path: /mnt/phantom_share/appdata/youtube-stream
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - phantom
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtube-stream-local-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-streamer
  namespace: media
  labels:
    app: youtube-streamer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: youtube-streamer
  template:
    metadata:
      labels:
        app: youtube-streamer
    spec:
      nodeSelector:
        kubernetes.io/hostname: phantom
      containers:
        - name: ffmpeg
          image: linuxserver/ffmpeg:latest
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "2500m"
          env:
            - name: YOUTUBE_KEY
              valueFrom:
                secretKeyRef:
                  name: youtube-stream-key
                  key: KEY
          securityContext:
            privileged: true
          volumeMounts:
            # Mount parent dev and sys trees to monitor hardware events live
            - mountPath: /dev
              name: host-dev
            - mountPath: /sys
              name: host-sys
            - mountPath: /tmp/stream-run
              name: temp-volume
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                echo "Scanning kernel space for TANDBERG PrecisionHD Camera node..."
                TANDBERG_DEV=""
                
                # Dynamic hardware loop scanning the kernel sysfs parameters
                for syspath in /sys/class/video4linux/video*; do
                  if cat "$syspath/name" 2>/dev/null | grep -q -i "TANDBERG"; then
                    TANDBERG_DEV="/dev/$(basename "$syspath")"
                    break
                  fi
                done
                
                if [ -z "$TANDBERG_DEV" ]; then
                  echo "CRITICAL: TANDBERG Hardware Camera not found on the USB bus! Retrying in 5 seconds..."
                  sleep 5
                  continue
                fi
                
                echo "Success! Target camera mapped on active node: $TANDBERG_DEV"
                echo "Launching True 30fps Streaming Engine..."
                
                ffmpeg -loglevel info -fflags nobuffer -flags low_delay \
                -f v4l2 -input_format mjpeg -video_size 1280x720 -framerate 30 -i "$TANDBERG_DEV" \
                -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
                -c:v libx264 -preset ultrafast -b:v 4000k -maxrate 4000k -bufsize 8000k \
                -pix_fmt yuv420p -r 30 -g 60 \
                -c:a aac -b:a 128k \
                -f flv rtmps://a.rtmp.youtube.com:443/live2/$YOUTUBE_KEY;
                
                echo "Connection dropped or camera link severed. Re-scanning system bus in 5 seconds..."
                sleep 5;
              done
      volumes:
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-sys
          hostPath:
            path: /sys
        - name: temp-volume
          persistentVolumeClaim:
            claimName: youtube-stream-local-pvc
