apiVersion: v1
kind: PersistentVolume
metadata:
  name: youtube-stream-local-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-ssd
  local:
    path: /mnt/phantom_share/appdata/youtube-stream
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - phantom
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtube-stream-local-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-streamer
  namespace: media
  labels:
    app: youtube-streamer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: youtube-streamer
  template:
    metadata:
      labels:
        app: youtube-streamer
    spec:
      nodeSelector:
        kubernetes.io/hostname: phantom
      containers:
        - name: ffmpeg
          image: linuxserver/ffmpeg:latest
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "2500m" # Raised slightly to allow comfortable 30fps encoding
          env:
            - name: YOUTUBE_KEY
              valueFrom:
                secretKeyRef:
                  name: youtube-stream-key
                  key: KEY
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /dev/video0
              name: webcam
            - mountPath: /tmp/stream-run
              name: temp-volume
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                echo "Starting YouTube-Compliant True 30fps Transcoder Engine..."
                
                # Optimized Changes:
                # -preset ultrafast allows true 30fps with minimal CPU cycles
                # Switched output destination endpoint to secure RTMPS (port 443)
                ffmpeg -loglevel info -fflags nobuffer -flags low_delay \
                -f v4l2 -input_format mjpeg -video_size 1280x720 -framerate 30 -i /dev/video0 \
                -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
                -c:v libx264 -preset ultrafast -b:v 4000k -maxrate 4000k -bufsize 8000k \
                -pix_fmt yuv420p -r 30 -g 60 \
                -c:a aac -b:a 128k \
                -f flv rtmps://a.rtmp.youtube.com:443/live2/$YOUTUBE_KEY;
                
                echo "Stream disconnected. Re-spawning pipeline in 5 seconds...";
                sleep 5;
              done
      volumes:
        - name: webcam
          hostPath:
            path: /dev/video2 # Correctly targeting your Tandberg camera hardware node
        - name: temp-volume
          persistentVolumeClaim:
            claimName: youtube-stream-local-pvc
